version: '3.9'

services:

  # ── SQL Server ──────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vas-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 10

  # ── .NET API ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vas-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=VoiceAgentStudio;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
      - JwtSettings__SecretKey=VoiceAgentStudio-SuperSecret-Key-2024-AtLeast32Chars!
      - JwtSettings__Issuer=VoiceAgentStudio.API
      - JwtSettings__Audience=VoiceAgentStudio.Frontend
      - JwtSettings__ExpiryHours=8
      - OpenAI__ApiKey=${OPENAI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy

  # ── Angular Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vas-frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  sqlserver_data:
